<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Exporter Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animate"></div>
    
    <div class="container">
        <!-- SCREEN 1: CONFIGURATION -->
        <section id="screenConfig" class="screen">
            <header>
                <h1 class="glow-text">Figma Export <span>Pro</span></h1>
                <p class="subtitle">Trích xuất thiết kế thành dữ liệu JSON và hình ảnh</p>
            </header>
            <main class="glass-card">
                <div class="input-group">
                    <label for="token">Personal Access Token</label>
                    <input type="password" id="token" placeholder="Nhập figd_..." autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="fileLink">Figma File Link hoặc Key</label>
                    <input type="text" id="fileLink" placeholder="https://www.figma.com/design/...">
                </div>
                <button id="exportBtn" class="primary-btn">Bắt đầu Export</button>
            </main>
        </section>

        <!-- SCREEN 2: PROCESSING -->
        <section id="screenProcess" class="screen hidden">
            <header>
                <h1 class="glow-text small">Đang xử lý...</h1>
            </header>
            <main class="glass-card">
                <div id="progressStepper" class="stepper">
                    <div class="step" id="step1"><span>1</span> Tải dữ liệu</div>
                    <div class="step" id="step2"><span>2</span> Phân tách</div>
                    <div class="step" id="step3"><span>3</span> Hoàn tất</div>
                </div>
                <div id="logOutput" class="log-output"></div>
            </main>
        </section>

        <!-- SCREEN 3: RESULTS -->
        <section id="screenResults" class="screen hidden">
            <header>
                <h1 class="glow-text small">Kết quả <span>Export</span></h1>
                <button id="backBtn" class="back-link">← Quay lại</button>
            </header>
            <div id="screenGrid" class="screen-grid"></div>
        </section>
    </div>

    <!-- MODAL DETAIL -->
    <div id="detailModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content glass-card">
            <button id="closeModal" class="close-btn">&times;</button>
            <div class="modal-body">
                <div class="modal-left">
                    <h3>Xem trước</h3>
                    <div class="img-container">
                        <div class="img-wrapper">
                            <img id="modalImg" src="" alt="Preview">
                            <div id="hoverOverlay"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-right">
                    <h3>Dữ liệu JSON</h3>
                    <pre id="modalJson"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
